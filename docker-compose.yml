services:
  mainmatka:
    build:
      context: ./MainMatka_Game
      dockerfile: Dockerfile
    container_name: mainmatka-web
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Kolkata
      MAINMATKA_SITE_URL: http://localhost:8080/
      MAINMATKA_SITE_DOMAIN: localhost
      MAINMATKA_DB_HOST: mainmatka-db
      MAINMATKA_DB_USER: mainmatka_user
      MAINMATKA_DB_PASS: mainmatka_pass_2024
      MAINMATKA_DB_NAME: mainmatka
      MAINMATKA_ADMIN_USERNAME: admin
      # Password: admin123 (change in production)
      MAINMATKA_ADMIN_PASSWORD_HASH: "$$2y$$10$$VhNOlD30i.p1G/A7RPdZmOSctVq0gdhrKsFweEZTb.dyrdfspyygy"
    depends_on:
      mainmatka-db:
        condition: service_healthy
    restart: unless-stopped

  mainmatka-db:
    image: mysql:8.0
    container_name: mainmatka-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass2024
      MYSQL_DATABASE: mainmatka
      MYSQL_USER: mainmatka_user
      MYSQL_PASSWORD: mainmatka_pass_2024
      TZ: Asia/Kolkata
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass2024"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
